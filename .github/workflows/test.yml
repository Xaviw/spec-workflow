name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workflow:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.12.0, 24.x]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
